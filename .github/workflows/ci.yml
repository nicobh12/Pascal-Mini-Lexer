name: Mini-Pascal Compiler CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test Suite — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # Layer 1 — Lexer tests (happy-path + error paths)
      # ----------------------------------------------------------------
      - name: "Layer 1 · Lexer tests"
        run: pytest tests/test_lexer.py tests/test_lexer_errors.py -v --tb=short

      # ----------------------------------------------------------------
      # Layer 2 — Parser tests (155 exhaustive cases)
      # ----------------------------------------------------------------
      - name: "Layer 2 · Parser tests"
        run: pytest tests/test_parser.py -v --tb=short

      # ----------------------------------------------------------------
      # Layer 3 — Semantic analysis tests
      # ----------------------------------------------------------------
      - name: "Layer 3 · Semantic tests"
        run: pytest tests/test_semantic.py -v --tb=short

      # ----------------------------------------------------------------
      # Full suite with coverage
      # ----------------------------------------------------------------
      - name: "Full test suite with coverage"
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short \
            --cov=mini_pascal_lex \
            --cov=mini_pascal_parser \
            --cov=mini_pascal_semantic \
            --cov=mini_pascal_compiler \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  # ----------------------------------------------------------------
  # Demo smoke-test: both demo scripts must exit 0
  # ----------------------------------------------------------------
  demo-smoke:
    name: "Demo smoke tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: "demo.py (valid program)"
        run: python demo.py
      - name: "demo_errors.py (error program)"
        run: python demo_errors.py

  # ----------------------------------------------------------------
  # Docker integration test
  # ----------------------------------------------------------------
  docker:
    name: "Docker build & test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t mini-pascal-compiler .
      - name: Run tests in container
        run: docker run --rm mini-pascal-compiler pytest tests/ -v
